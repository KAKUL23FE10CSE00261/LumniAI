{% extends "base.html" %}

{% block title %}

Login

{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header bg-success text-white text-center">

<h3>Login</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-success w-100">

Login

</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="{{url_for('auth.signup')}}">

Signup

</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
